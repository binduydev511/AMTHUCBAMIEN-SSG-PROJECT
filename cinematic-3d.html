<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ẩm Thực Việt - Trải Nghiệm Tinh Hoa 3D</title>
    <style>
        :root {
            --accent: #d4a373;
            --bg: #050505;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .section {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 10%;
            box-sizing: border-box;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease;
        }

        .section.active {
            opacity: 1;
            transform: translateY(0);
        }

        .content-box {
            max-width: 500px;
            pointer-events: auto;
        }

        .region-tag {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 1rem;
            display: block;
        }

        .dish-name {
            font-size: 5rem;
            font-family: 'Playfair Display', serif;
            margin: 0;
            line-height: 1;
            color: var(--accent);
        }

        .dish-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.7;
            margin-top: 2rem;
            font-weight: 300;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: #222;
            margin-top: 2rem;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--accent);
        }

        .scroll-indicator {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.6;
        }

        .mouse {
            width: 20px;
            height: 35px;
            border: 2px solid #fff;
            border-radius: 12px;
            position: relative;
            margin-bottom: 10px;
        }

        .wheel {
            width: 4px;
            height: 8px;
            background: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 5px;
            border-radius: 2px;
            animation: scroll-wheel 2s infinite;
        }

        @keyframes scroll-wheel {
            0% {
                opacity: 1;
                top: 5px;
            }

            100% {
                opacity: 0;
                top: 20px;
            }
        }

        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            pointer-events: auto;
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .back-btn:hover {
            opacity: 1;
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="loading-screen">
        <div style="font-size: 1.5rem; letter-spacing: 10px; text-transform: uppercase; color: var(--accent);">Tinh Hoa
            Việt</div>
        <div class="loader-bar">
            <div id="progress" class="loader-progress"></div>
        </div>
    </div>

    <a href="index.html" class="back-btn">Quay lại trang chủ</a>

    <div class="scroll-indicator">
        <div class="mouse">
            <div class="wheel"></div>
        </div>
        <span style="font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Cuộn để khám phá</span>
    </div>

    <canvas id="three-canvas"></canvas>

    <div id="ui-layer">
        <!-- Sections will be generated by JS -->
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="js/cinematic.js"></script>
</body>

</html>
